function showPlayCardModal() {
  let p = currentPlayer();
  let names = {knight:'🗡️ 骑士',victoryPoint:'🏆 胜利点',roadBuilding:'🛤️ 修路 (免费2条)',yearOfPlenty:'🌾 丰年 (拿2张)',monopoly:'💰 垄断'};
  
  let playable = {};
  p.devCards.forEach(c => {
    if (c === 'victoryPoint') return;
    playable[c] = (playable[c] || 0) + 1;
  });
  
  let html = `<h2>🎴 打出发展卡</h2>`;
  
  if (Object.keys(playable).length === 0) {
    html += `<p>没有可以打出的卡片</p>`;
  } else {
    for (let c in playable) {
      html += `<div style="margin:6px 0"><button class="btn" onclick="playDevCard('${c}')">${names[c]} ×${playable[c]}</button></div>`;
    }
  }
  
  html += `<div class="modal-btns"><button class="btn" onclick="closeModal('modal-playcard')">关闭</button></div>`;
  
  document.getElementById('playcard-content').innerHTML = html;
  document.getElementById('modal-playcard').classList.add('show');
}

window.playDevCard = function(type) {
  let p = currentPlayer();
  let idx = p.devCards.indexOf(type);
  if (idx === -1) return;
  p.devCards.splice(idx, 1);
  G.playedDevThisTurn = true;
  
  closeModal('modal-playcard');
  
  switch (type) {
    case 'knight':
      p.playedKnights++;
      updateLargestArmy();
      log(`⚔️ ${p.name} 打出了骑士卡`);
      interactionMode = 'moveRobber';
      updateUI();
      break;
      
    case 'roadBuilding':
      log(`🛤️ ${p.name} 打出了修路卡`);
      G._freeRoads = 2;
      interactionMode = 'placeRoad';
      highlightEdges = getValidRoadSpots(G.currentPlayer, false);
      updateUI();
      break;
      
    case 'yearOfPlenty':
      log(`🌾 ${p.name} 打出了丰年卡`);
      showYearOfPlentyModal(2);
      break;
      
    case 'monopoly':
      log(`💰 ${p.name} 打出了垄断卡`);
      showMonopolyModal();
      break;
  }
  
  if (!checkVictory()) updateUI();
};

function showYearOfPlentyModal(remaining) {
  let html = `<h2>🌾 丰年 - 选择资源 (还需选${remaining}种)</h2>`;
  RES.forEach(r => {
    html += `<button class="btn" onclick="pickYoP('${r}', ${remaining})" style="margin:4px">${RES_CN[r]}</button>`;
  });
  document.getElementById('playcard-content').innerHTML = html;
  document.getElementById('modal-playcard').classList.add('show');
}

window.pickYoP = function(res, remaining) {
  currentPlayer().resources[res]++;
  if (remaining > 1) {
    showYearOfPlentyModal(remaining - 1);
  } else {
    closeModal('modal-playcard');
    updateUI();
  }
};

function showMonopolyModal() {
  let html = `<h2>💰 垄断 - 选择一种资源</h2>`;
  RES.forEach(r => {
    html += `<button class="btn" onclick="doMonopoly('${r}')" style="margin:4px">${RES_CN[r]}</button>`;
  });
  document.getElementById('playcard-content').innerHTML = html;
  document.getElementById('modal-playcard').classList.add('show');
}

window.doMonopoly = function(res) {
  let p = currentPlayer();
  let total = 0;
  G.players.forEach((pl, i) => {
    if (i === G.currentPlayer) return;
    total += pl.resources[res];
    pl.resources[res] = 0;
  });
  p.resources[res] += total;
  log(`💰 ${p.name} 垄断了${RES_CN[res]}，获得 ${total} 张`);
  closeModal('modal-playcard');
  updateUI();
};

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

// ============================================================
// GAME START
// ============================================================

function startGameWithPlayers(playerDefs) {
  initGame(playerDefs.length, playerDefs);
  resizeCanvas();
  
  log(`🎮 新游戏开始！${playerDefs.length} 位玩家`);
  playerDefs.forEach((pd, i) => {
    log(`  ${PLAYER_COLORS[i] === '#e74c3c' ? '🔴' : PLAYER_COLORS[i] === '#3498db' ? '🔵' : PLAYER_COLORS[i] === '#f39c12' ? '🟠' : '🟢'} ${pd.name} (${pd.type === 'ai' ? '电脑' : '人类'})`);
  });
  log(`--- ${currentPlayer().name} 的回合 (布局) ---`);
  
  if (!isCurrentPlayerAI()) {
    highlightVertices = getValidSettlementSpots(0, true);
  }
  updateUI();
  triggerAIIfNeeded();
}

window.addEventListener('resize', resizeCanvas);

// Show setup modal and initialize player count
preloadTileImages().then(() => {
  document.getElementById('modal-setup').classList.add('show');
  setPlayerCount(4);
});
</script>
